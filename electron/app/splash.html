<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0a140e;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      }
      .wrap {
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        -webkit-user-select: none;
        user-select: none;
      }
      .logo {
        width: 128px;
        height: 128px;
        border-radius: 28px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
        animation: pop 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) both;
      }
      .name {
        color: #f3f6f3;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.2px;
        opacity: 0;
        animation: fade 0.6s ease 0.25s forwards;
      }
      .tag {
        color: rgba(243, 246, 243, 0.5);
        font-size: 13px;
        margin-top: -12px;
        opacity: 0;
        animation: fade 0.6s ease 0.45s forwards;
      }
      .dots {
        display: flex;
        gap: 7px;
        margin-top: 6px;
      }
      .dots i {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #16a34a;
        animation: bounce 1.1s infinite ease-in-out;
      }
      .dots i:nth-child(2) {
        animation-delay: 0.15s;
      }
      .dots i:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes pop {
        from {
          transform: scale(0.6);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      @keyframes fade {
        to {
          opacity: 1;
        }
      }
      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.4;
        }
        40% {
          transform: translateY(-6px);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <img class="logo" src="../assets/logo.png" alt="Flocker" />
      <div class="name">Flocker</div>
      <div class="tag">The Poultry Farm Operating System</div>
      <div class="dots"><i></i><i></i><i></i></div>
    </div>
  </body>
</html>
