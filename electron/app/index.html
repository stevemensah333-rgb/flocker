<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flocker — Offline Farm OS</title>
    <style>
      :root {
        /* Farmio-inspired forest + lime palette (matches landing) */
        --bg: #0D130F;
        --side: #0A0F0B;
        --surface: #16201A;
        --surface2: #1D2A22;
        --line: rgba(242, 240, 231, 0.10);
        --line-strong: rgba(242, 240, 231, 0.16);
        --ink: #F2F0E7;
        --muted: rgba(242, 240, 231, 0.55);
        --muted2: rgba(242, 240, 231, 0.40);
        --lime: #C6F24E;
        --lime-soft: rgba(198, 242, 78, 0.14);
        --green: #6FCF97;
        --amber: #E6C15A;
        --red: #E0876B;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: "Sora", -apple-system, "Segoe UI", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .app { display: flex; height: 100vh; }

      /* ---------------- Sidebar ---------------- */
      .side {
        width: 248px; flex: 0 0 248px; background: var(--side);
        border-right: 1px solid var(--line);
        padding: 20px 14px 14px; display: flex; flex-direction: column;
        position: relative;
      }
      .brand {
        display: flex; align-items: center; gap: 10px; padding: 4px 8px 22px;
      }
      .brand .logo {
        width: 30px; height: 30px; border-radius: 9px; background: var(--lime);
        display: grid; place-items: center; color: #0D130F; font-weight: 800; font-size: 16px;
      }
      .brand .name { font-size: 19px; font-weight: 700; letter-spacing: -0.01em; }
      .brand .tag {
        margin-left: auto; font-size: 10px; font-weight: 700; color: var(--lime);
        border: 1px solid var(--lime-soft); background: var(--lime-soft);
        padding: 3px 8px; border-radius: 999px;
      }

      .sec { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; color: var(--muted2);
        text-transform: uppercase; padding: 16px 12px 8px; }

      .nav {
        width: 100%; background: none; border: 0; color: var(--muted);
        text-align: left; padding: 10px 12px; border-radius: 11px;
        font-size: 14px; cursor: pointer; font-weight: 600; font-family: inherit;
        display: flex; align-items: center; gap: 12px; transition: background .15s, color .15s;
      }
      .nav svg { width: 18px; height: 18px; flex: 0 0 18px; opacity: .8; }
      .nav:hover { color: var(--ink); background: var(--surface); }
      .nav.active { color: var(--ink); background: var(--surface); }
      .nav.active svg { opacity: 1; color: var(--lime); }

      .offline {
        margin-top: 14px; font-size: 11px; color: var(--muted2);
        display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      }
      .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green);
        box-shadow: 0 0 0 3px rgba(111,207,151,.18); }

      /* ---------------- Profile (bottom-left) ---------------- */
      .profile-wrap { margin-top: auto; position: relative; padding-top: 12px; }
      .profile {
        display: flex; align-items: center; gap: 11px; width: 100%;
        background: var(--surface); border: 1px solid var(--line);
        border-radius: 14px; padding: 10px 11px; cursor: pointer; font-family: inherit;
        transition: border-color .15s, background .15s;
      }
      .profile:hover { border-color: var(--line-strong); background: var(--surface2); }
      .avatar {
        width: 36px; height: 36px; border-radius: 50%; flex: 0 0 36px;
        background: linear-gradient(135deg, var(--lime), var(--green));
        display: grid; place-items: center; color: #0D130F; font-weight: 800; font-size: 14px;
      }
      .profile .who { min-width: 0; flex: 1; text-align: left; }
      .profile .who .n { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 6px; }
      .profile .who .n .role { font-size: 9px; font-weight: 700; color: var(--muted); border: 1px solid var(--line-strong); padding: 1px 6px; border-radius: 999px; }
      .profile .who .e { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .profile .chev { color: var(--muted); transition: transform .2s; }
      .profile-wrap.open .profile .chev { transform: rotate(180deg); }

      .popup {
        position: absolute; bottom: calc(100% + 8px); left: 0; right: 0;
        background: var(--surface); border: 1px solid var(--line-strong);
        border-radius: 14px; padding: 6px; box-shadow: 0 18px 44px rgba(0,0,0,.5);
        opacity: 0; transform: translateY(8px); pointer-events: none;
        transition: opacity .18s ease, transform .18s cubic-bezier(.22,1,.36,1);
      }
      .profile-wrap.open .popup { opacity: 1; transform: translateY(0); pointer-events: auto; }
      .pop-item {
        width: 100%; background: none; border: 0; color: var(--ink); font-family: inherit;
        text-align: left; padding: 10px 12px; border-radius: 10px; font-size: 13px; font-weight: 600;
        cursor: pointer; display: flex; align-items: center; gap: 11px;
      }
      .pop-item svg { width: 16px; height: 16px; opacity: .75; }
      .pop-item:hover { background: var(--surface2); }
      .pop-item.danger { color: var(--red); }
      .pop-sep { height: 1px; background: var(--line); margin: 5px 8px; }
      .pop-head { padding: 12px 12px 8px; }
      .pop-head .n { font-size: 13px; font-weight: 700; }
      .pop-head .e { font-size: 11px; color: var(--muted); }

      /* ---------------- Main ---------------- */
      .main { flex: 1; overflow-y: auto; padding: 34px 40px 60px; }
      .main-head { margin-bottom: 26px; }
      h1 { font-weight: 700; font-size: 30px; letter-spacing: -0.02em; margin: 0 0 6px; }
      .sub { color: var(--muted); font-size: 14px; margin: 0; max-width: 640px; }

      .card { background: var(--surface); border: 1px solid var(--line); border-radius: 18px; padding: 20px; margin-bottom: 18px; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; }
      label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
      input, select {
        background: var(--surface2); border: 1px solid var(--line); color: var(--ink);
        border-radius: 11px; padding: 10px 12px; font-size: 14px; width: 100%; font-family: inherit;
      }
      input:focus, select:focus { outline: none; border-color: var(--lime); }
      .btn { background: var(--lime); color: #0D130F; border: 0; border-radius: 999px;
        padding: 11px 20px; font-weight: 700; font-size: 14px; cursor: pointer; font-family: inherit; }
      .btn:hover { filter: brightness(1.05); }
      .btn.ghost { background: transparent; color: var(--ink); border: 1px solid var(--line-strong); }
      .btn.sm { padding: 7px 14px; font-size: 12px; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--line); }
      th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
      td input, td select { padding: 7px 9px; }
      .num { text-align: right; }
      .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; }
      .met { background: rgba(111,207,151,.16); color: var(--green); }
      .close { background: rgba(230,193,90,.16); color: var(--amber); }
      .deficit { background: rgba(224,135,107,.16); color: var(--red); }
      .stat { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 18px; }
      .stat .card { margin: 0; }
      .stat .big { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
      .stat .lbl { color: var(--muted); font-size: 12px; margin-top: 4px; }
      .link { color: var(--lime); cursor: pointer; background: none; border: 0; font-size: 13px; font-family: inherit; font-weight: 600; }
      .empty { color: var(--muted); font-size: 13px; padding: 26px 4px; text-align: center; }
      .flex-between { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
      .badge { font-size: 11px; color: var(--muted); }
      .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
      @media (max-width: 900px) { .grid2 { grid-template-columns: 1fr; } .stat { grid-template-columns: repeat(2,1fr);} }
      ::-webkit-scrollbar { width: 10px; } ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 999px; }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="side">
        <div class="brand">
          <div class="logo">F</div>
          <div class="name">Flocker</div>
          <div class="tag">Offline</div>
        </div>

        <div class="sec">Manage</div>
        <button class="nav active" data-view="feed">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l3 8 4-16 3 8h4"/></svg>
          Feed Management
        </button>
        <button class="nav" data-view="records">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="M8 9h8M8 13h8M8 17h5"/></svg>
          Records
        </button>

        <div class="offline"><span class="dot"></span> Works offline · saved on this device</div>

        <div class="profile-wrap" id="profileWrap">
          <div class="popup" id="popup">
            <div class="pop-head">
              <div class="n">Farm Owner</div>
              <div class="e">This device · local only</div>
            </div>
            <div class="pop-sep"></div>
            <button class="pop-item" data-view="records">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="M8 9h8M8 13h8"/></svg>
              My Records
            </button>
            <button class="pop-item" id="exportAll">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>
              Export all data
            </button>
            <button class="pop-item" id="openFeedback">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              Send feedback
            </button>
            <div class="pop-sep"></div>
            <button class="pop-item danger" id="resetAll">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2m-9 0v14h10V6"/></svg>
              Clear local data
            </button>
          </div>
          <button class="profile" id="profileBtn">
            <div class="avatar">F</div>
            <div class="who">
              <div class="n">Farm Owner <span class="role">Local</span></div>
              <div class="e">Saved on this device</div>
            </div>
            <svg class="chev" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
          </button>
        </div>
      </aside>
      <main class="main" id="main"></main>
    </div>
    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
