<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flocker — Offline Farm OS</title>
    <style>
      :root {
        --bg: #1c1c1c;
        --panel: #242422;
        --panel-2: #2c2b28;
        --line: rgba(245, 240, 232, 0.12);
        --ink: #f5f0e8;
        --muted: rgba(245, 240, 232, 0.6);
        --gold: #d4840a;
        --green: #3f7d4e;
        --amber: #c98a12;
        --red: #b3452f;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .app { display: flex; height: 100vh; }
      /* Sidebar */
      .side {
        width: 220px; flex: 0 0 220px; border-right: 1px solid var(--line);
        padding: 22px 16px; display: flex; flex-direction: column; gap: 6px;
        background: var(--panel);
      }
      .brand { font-family: Georgia, "Times New Roman", serif; font-size: 26px; padding: 4px 8px 18px; }
      .brand span { color: var(--gold); }
      .nav { background: none; border: 0; color: var(--muted); text-align: left;
        padding: 11px 12px; border-radius: 10px; font-size: 14px; cursor: pointer; font-weight: 600; }
      .nav:hover { color: var(--ink); background: var(--panel-2); }
      .nav.active { color: var(--ink); background: var(--panel-2); box-shadow: inset 3px 0 0 var(--gold); }
      .offline { margin-top: auto; font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 7px; padding: 8px; }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
      /* Main */
      .main { flex: 1; overflow-y: auto; padding: 28px 32px; }
      h1 { font-family: Georgia, serif; font-weight: 500; font-size: 26px; margin: 0 0 4px; }
      .sub { color: var(--muted); font-size: 13px; margin: 0 0 22px; }
      .card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 18px; margin-bottom: 18px; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; }
      label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 600; }
      input, select {
        background: var(--panel-2); border: 1px solid var(--line); color: var(--ink);
        border-radius: 9px; padding: 9px 11px; font-size: 14px; width: 100%; font-family: inherit;
      }
      input:focus, select:focus { outline: none; border-color: var(--gold); }
      .btn { background: var(--gold); color: #1c1c1c; border: 0; border-radius: 999px;
        padding: 10px 18px; font-weight: 700; font-size: 14px; cursor: pointer; }
      .btn.ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
      .btn.sm { padding: 6px 12px; font-size: 12px; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { text-align: left; padding: 9px 8px; border-bottom: 1px solid var(--line); }
      th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
      td input { padding: 6px 8px; }
      .num { text-align: right; }
      .pill { display: inline-block; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 700; }
      .met { background: rgba(63,125,78,.25); color: #9fd6ac; }
      .close { background: rgba(201,138,18,.25); color: #ecc477; }
      .deficit { background: rgba(179,69,47,.25); color: #e39a86; }
      .stat { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
      .stat .card { margin: 0; text-align: center; }
      .stat .big { font-size: 24px; font-weight: 700; font-family: Georgia, serif; }
      .stat .lbl { color: var(--muted); font-size: 12px; margin-top: 4px; }
      .link { color: var(--gold); cursor: pointer; background: none; border: 0; font-size: 13px; }
      .empty { color: var(--muted); font-size: 13px; padding: 22px 4px; text-align: center; }
      .flex-between { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
      .badge { font-size: 11px; color: var(--muted); }
      .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
      @media (max-width: 820px) { .grid2 { grid-template-columns: 1fr; } .stat { grid-template-columns: repeat(2,1fr);} }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="side">
        <div class="brand">Flock<span>er</span></div>
        <button class="nav active" data-view="feed">Feed Management</button>
        <button class="nav" data-view="records">Records</button>
        <div class="offline"><span class="dot"></span> Works offline · saved on this device</div>
      </aside>
      <main class="main" id="main"></main>
    </div>
    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
